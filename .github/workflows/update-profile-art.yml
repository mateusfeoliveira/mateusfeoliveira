name: Update contribution heatmap

on:
  schedule:
    - cron: "0 3 * * *"  # todo dia às 03:00 UTC (meia-noite em SP)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate heatmap SVG from real contribution data
        run: python scripts/generate_contrib_heatmap.py mateusfeoliveira contrib-heatmap.svg

      - name: Commit updated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add contrib-heatmap.svg
          git diff --cached --quiet && echo "No changes" || git commit -m "chore: refresh contribution heatmap"
          git push
